services:
  - type: web
    name: secdev-backend
    env: node
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
